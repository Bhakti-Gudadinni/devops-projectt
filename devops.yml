name: DevOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    # 🐍 Setup Python (optional)
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    # 📦 Install dependencies
    - name: Install Dependencies
      run: pip install flask

    # 🧪 Test (optional)
    - name: Run Tests
      run: echo "No tests added yet"

    # 🐳 Build Docker Image
    - name: Build Docker Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-app .

    # 🔐 Login to Docker Hub
    - name: Docker Login
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # 📤 Push Image
    - name: Push Docker Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/devops-app

    # 🚀 Run Container
    - name: Run Container
      run: docker run -d -p 5000:5000 ${{ secrets.DOCKER_USERNAME }}/devops-app

    # ❤️ Health Check (SELF-HEAL STARTS HERE)
    - name: Health Check
      run: |
        sleep 10
        curl -f http://localhost:5000 || exit 1

    # 🔁 Self-Healing (Restart if Failed)
    - name: Restart Container if Failed
      if: failure()
      run: |
        docker stop $(docker ps -q)
        docker run -d -p 5000:5000 ${{ secrets.DOCKER_USERNAME }}/devops-app

    # 🔔 Notification (Always runs)
    - name: Notify
      if: always()
      run: echo "Pipeline Status: ${{ job.status }}"
